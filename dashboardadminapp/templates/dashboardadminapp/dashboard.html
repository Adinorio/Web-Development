<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .container-box { border: 2px solid #ddd; border-radius: 10px; padding: 20px; cursor: pointer; }
        .add-user { background: linear-gradient(to right, #28a745, #17a2b8, #ffc107); }
        .list-users { background: linear-gradient(to right, #17a2b8, #ffc107, #28a745); }
        .user-roles { background: linear-gradient(to right, #ffc107, #28a745, #17a2b8); }
        .container-box:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Admin Dashboard</h2>
        <div class="row">
            <!-- ✅ Add Users -->
            <div class="col-md-4">
                <a href="{% url 'dashboardadminapp:add_user' %}" class="text-decoration-none">
                    <div class="container-box add-user text-white text-center p-4 rounded shadow">
                        <h3 class="mb-0">Add Users</h3>
                    </div>
                </a>
            </div>

            <!-- ✅ List of Users (Fixed URL) -->
            <div class="col-md-4">
                <a href="{% url 'dashboardadminapp:list_users' %}" class="text-decoration-none">
                    <div class="container-box list-users text-white text-center p-4 rounded shadow">
                        <h3 class="mb-0">List of Users</h3>
                    </div>
                </a>
            </div>

            <!-- ✅ User Roles -->
            <div class="col-md-4">
                <div class="container-box user-roles text-white text-center p-4 rounded shadow">
                    <h3 class="mb-0">User Roles</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

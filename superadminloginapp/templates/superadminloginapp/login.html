{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>AVICAST - Login</title>
</head>
<body>

    <!-- Floating Logo -->
    <div class="logo-container">
        <div class="logo">
            <img src="{% static 'images/TranspaCENRO.png' %}" alt="Logo">
        </div>
    </div>

    <!-- Floating Text Carousel -->
    <div class="carousel-text">
        <p id="carousel-text">Did you know? Some birds migrate more than 10,000 miles!</p>
    </div>

    <!-- Sticky Login Box -->
    <div class="login-container">
        <h2>AVICAST</h2>
        <p class="app-title">Migratory Bird Census Management System</p>
        <form method="POST" class="login-form">
            {% csrf_token %}

            <div class="input-group">
                <label for="user_id">User ID</label>
                <div class="input-wrapper">
                    <i class="fa fa-user"></i>
                    <input type="text" name="user_id" id="user_id" required placeholder="Enter your ID number">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa fa-lock"></i>
                    <input type="password" name="password" id="password" required placeholder="Enter your password">
                </div>
            </div>

            <a href="#" class="forgot-password">Forgot Password?</a>
            <button type="submit" class="login-button">LOGIN</button>

            {% if error_message %}
                <p class="error-message">{{ error_message }}</p>
            {% endif %}

            <input type="hidden" name="next" value="{{ request.GET.next }}">
        </form>
    </div>

    <script>
        // JavaScript for automatic text carousel
        const trivia = [
            "Did you know? Some birds migrate more than 10,000 miles!<br>This incredible journey can take <br>weeks or even months as they <br>travel across continents.",
            "Birds can fly at speeds of up to 60 miles per hour!<br>This makes them some of the fastest <br>creatures in the animal kingdom.",
            "The Arctic Tern has the longest migration of any bird, <br>traveling 25,000 miles annually.<br>Their migration takes them from the Arctic <br>to the Antarctic and back.",
            "A group of flamingos is called a 'flamboyance'.<br>This colorful and elegant bird is known for <br>its unique <br>appearance and social behavior.",
            "The fastest bird in the world is the Peregrine Falcon,<br> which can reach speeds of over 240 mph!<br>It achieves these speeds<br> while diving to catch prey."
        ];
    
        let currentIndex = 0;
    
        const carouselText = document.getElementById("carousel-text");
    
        function updateCarouselText() {
            carouselText.innerHTML = trivia[currentIndex];  // Use innerHTML to parse <br> tags
            currentIndex = (currentIndex + 1) % trivia.length;
        }
    
        // Automatically update the text every 10 seconds
        setInterval(updateCarouselText, 10000);
    
        // Initial text load
        updateCarouselText();
    </script>
    
    

</body>
</html>
